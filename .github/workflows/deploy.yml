name: Deploy to cPanel via FTP

# Trigger this workflow every time you push to the 'master' branch in git
on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Vite usually works well with Node version 18+
          cache: 'npm'

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Build the Vite React project
      - name: Build Project
        run: npm run build

      # 5. Deploy the 'dist' folder to cPanel via FTP
      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # We only want to upload the build output folder
          local-dir: ./dist/
          # Ensure this path matches the FTP account's default directory
          server-dir: ./
